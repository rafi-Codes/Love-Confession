<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You, With Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root {
  --gold: var(--config-gold, #d4a853);
  --rose: var(--config-rose, #c84b6e);
  --cream: var(--config-cream, #f5ede0);
  --deep: var(--config-deep, #0a0608);
  --soil: var(--config-soil, #1a0f08);
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--deep);
  font-family: 'EB Garamond', Georgia, serif;
  cursor: none;
}
#cursor {
  position: fixed; width: 8px; height: 8px;
  background: rgba(212,168,83,0.7); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: transform 0.1s ease;
  box-shadow: 0 0 12px rgba(212,168,83,0.5);
}
#cursor-trail {
  position: fixed; width: 28px; height: 28px;
  border: 1px solid rgba(212,168,83,0.25); border-radius: 50%;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: left 0.18s ease, top 0.18s ease;
}
#mainCanvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  display: block;
}
.vignette {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse 70% 70% at 50% 45%,
    transparent 0%,
    rgba(4,2,3,0.35) 60%,
    rgba(4,2,3,0.82) 100%);
}
.grain {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size: 220px;
  animation: grainShift 0.12s steps(1) infinite;
}
@keyframes grainShift {
  0%  { background-position: 0 0; }
  20% { background-position: -60px 40px; }
  40% { background-position: 80px -30px; }
  60% { background-position: -40px -60px; }
  80% { background-position: 70px 50px; }
  100%{ background-position: 0 0; }
}
.chroma {
  position: fixed; inset: 0; z-index: 4; pointer-events: none;
  opacity: 0;
  animation: chromaIn 2s ease 8s forwards;
  mix-blend-mode: screen;
  background: radial-gradient(ellipse 40% 20% at 30% 20%,
    rgba(255,30,80,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 30% 15% at 70% 80%,
    rgba(30,80,255,0.04) 0%, transparent 70%);
}
@keyframes chromaIn { to { opacity: 1; } }
#ui {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding-top: clamp(32px, 6vh, 64px);
}
.headline-wrap {
  text-align: center;
  opacity: 0;
  animation: titleReveal 2.2s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
}
@keyframes titleReveal {
  from { opacity:0; transform: translateY(22px) scale(0.97); filter: blur(6px); }
  to   { opacity:1; transform: translateY(0)    scale(1);    filter: blur(0); }
}
.headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 4.5vw, 3.4rem);
  font-weight: 400; font-style: italic;
  letter-spacing: 0.06em;
  color: var(--cream);
  text-shadow:
    0 2px 40px rgba(212,168,83,0.5),
    0 0 80px rgba(212,168,83,0.2),
    0 1px 0 rgba(0,0,0,0.8);
  line-height: 1.1;
}
.headline span {
  color: var(--gold);
  font-style: normal;
  font-weight: 700;
}
.subtitle {
  margin-top: 10px;
  font-family: 'EB Garamond', serif;
  font-size: clamp(0.85rem, 1.8vw, 1.1rem);
  font-style: italic;
  letter-spacing: 0.28em;
  color: rgba(212,168,83,0.55);
  text-transform: uppercase;
}
.signature {
  position: fixed; bottom: clamp(28px,5vh,52px); left: 0; right: 0;
  text-align: center; z-index: 5; pointer-events: none;
  opacity: 0;
  animation: fadeUp 1.8s ease 9s forwards;
}
.signature p {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: clamp(0.8rem,1.5vw,1rem);
  color: rgba(245,237,224,0.3);
  letter-spacing: 0.14em;
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.pill {
  position: fixed;
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: clamp(0.85rem,1.8vw,1.05rem);
  color: rgba(245,237,224,0.88);
  background: rgba(10,6,8,0.55);
  border: 0.5px solid rgba(212,168,83,0.22);
  backdrop-filter: blur(14px);
  border-radius: 999px;
  padding: 8px 22px 9px;
  pointer-events: none; z-index: 6;
  white-space: nowrap;
  animation: pillRise linear forwards;
  letter-spacing: 0.03em;
}
.pill::before {
  content: '';
  display: inline-block; width: 4px; height: 4px;
  background: var(--gold); border-radius: 50%;
  margin-right: 10px; vertical-align: middle;
  box-shadow: 0 0 6px var(--gold);
  animation: dotBlink 2.4s ease-in-out infinite;
}
@keyframes dotBlink { 0%,100%{opacity:1;}50%{opacity:0.3;} }
@keyframes pillRise {
  0%  { opacity:0; transform: translateY(0)   scale(0.93); }
  10% { opacity:1; transform: translateY(-14px) scale(1); }
  78% { opacity:1; transform: translateY(-110px) scale(1); }
  100%{ opacity:0; transform: translateY(-160px) scale(0.96); }
}
.spark {
  position: fixed; pointer-events: none; z-index: 8;
  width: 3px; height: 3px; border-radius: 50%;
  animation: sparkFly linear forwards;
}
@keyframes sparkFly {
  0%  { opacity:1; transform: translate(0,0) scale(1); }
  100%{ opacity:0; transform: var(--tx) scale(0); }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="mainCanvas"></canvas>
<div class="vignette"></div>
<div class="grain"></div>
<div class="chroma"></div>

<div id="ui">
  <div class="headline-wrap">
    <h1 class="headline">For You, With <span>Love</span></h1>
    <p class="subtitle">Anu</p>
  </div>
</div>

<div class="signature">
  <p>— with love, Rafi</p>
</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY, SCALE;

function resize() {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  CX = W / 2;
  CY = H * 0.46;
  SCALE = Math.min(W, H) / 700;
}
resize();
addEventListener('resize', () => { resize(); rebuildGrass(); });

const PI2 = Math.PI * 2;
function lerp(a,b,t){ return a + (b-a)*t; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function easeOut(t,p=3){ return 1-Math.pow(1-t,p); }
function easeInOut(t){ return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1; }
function easeOutBack(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

function radGrad(x,y,r0,r1,stops){
  r0=Math.max(0,r0||0); r1=Math.max(r0+0.001,r1||1);
  const g = ctx.createRadialGradient(x,y,r0,x,y,r1);
  stops.forEach(([t,c])=>g.addColorStop(clamp(t,0,1),c));
  return g;
}
function linGrad(x0,y0,x1,y1,stops){
  const g = ctx.createLinearGradient(x0,y0,x1,y1);
  stops.forEach(([t,c])=>g.addColorStop(clamp(t,0,1),c));
  return g;
}

let T = 0;
let startTime = null;
const BLOOM_START = CONFIG.BLOOM_START;
const BLOOM_DONE  = CONFIG.BLOOM_DONE;

// Breeze
let breezeVal = 0, breezeGust = 0, breezeGustTarget = 0, breezeGustTimer = 4;
function updateBreeze(dt) {
  if (T < BLOOM_DONE) return;
  breezeGustTimer -= dt;
  if (breezeGustTimer <= 0) {
    breezeGustTarget = (Math.random() - 0.38) * 1.0;
    breezeGustTimer  = 3.5 + Math.random() * 5;
  }
  breezeGust += (breezeGustTarget - breezeGust) * 0.008;
  breezeVal =
    Math.sin(T * 0.29 + 0.0) * 0.55 +
    Math.sin(T * 0.71 + 1.3) * 0.22 +
    Math.sin(T * 1.87 + 2.8) * 0.07 +
    breezeGust;
}

const STEM_BOT_OFFSET_Y = CONFIG.stem.bottomOffsetY;
const STEM_W = () => CONFIG.stem.width(SCALE);

function getStemPoints() {
  const bx = CX + breezeVal * 4;
  const by = CY + H * STEM_BOT_OFFSET_Y;
  const tx = CX + breezeVal * 28;
  const ty = CY;
  const c1x = bx + (tx-bx)*0.15 + breezeVal*8;
  const c1y = lerp(by,ty,0.4);
  const c2x = tx - (tx-bx)*0.1 + breezeVal*18;
  const c2y = lerp(by,ty,0.7);
  return { bx,by,tx,ty,c1x,c1y,c2x,c2y };
}

function cubicBez(p0x,p0y,p1x,p1y,p2x,p2y,p3x,p3y,t){
  const mt=1-t;
  return {
    x: mt*mt*mt*p0x + 3*mt*mt*t*p1x + 3*mt*t*t*p2x + t*t*t*p3x,
    y: mt*mt*mt*p0y + 3*mt*mt*t*p1y + 3*mt*t*t*p2y + t*t*t*p3y,
  };
}

// ── SOIL PARTICLES ────────────────────────────────────
const SOIL_PARTICLES = Array.from({length:CONFIG.particles.soil},()=>({
  x: Math.random(), depth: Math.random(),
  r: 0.8+Math.random()*2.2,
  hue: 18+Math.random()*22, sat: 30+Math.random()*25, li: 8+Math.random()*14,
}));

// ── GRASS ─────────────────────────────────────────────
let GRASS = [];
function rebuildGrass() {
  GRASS = Array.from({length: CONFIG.particles.grass(W)}, () => ({
    xf: Math.random(),
    h: (CONFIG.grass.minHeight+Math.random()*CONFIG.grass.maxHeight) * (CONFIG.grass.heightVariance+Math.random()*CONFIG.grass.heightVariance),
    w: CONFIG.grass.minWidth+Math.random()*CONFIG.grass.maxWidth,
    hue: CONFIG.grass.hueRange[0]+Math.random()*(CONFIG.grass.hueRange[1]-CONFIG.grass.hueRange[0]),
    sat: CONFIG.grass.satRange[0]+Math.random()*(CONFIG.grass.satRange[1]-CONFIG.grass.satRange[0]),
    li: CONFIG.grass.lightRange[0]+Math.random()*(CONFIG.grass.lightRange[1]-CONFIG.grass.lightRange[0]),
    phase: Math.random()*PI2, 
    freq: CONFIG.grass.minFreq+Math.random()*(CONFIG.grass.maxFreq-CONFIG.grass.minFreq),
    amp: CONFIG.grass.minAmp+Math.random()*(CONFIG.grass.maxAmp-CONFIG.grass.minAmp),
    curve: (Math.random()-0.5)*0.4,
  }));
}
rebuildGrass();

// ── SMALL GRASS FLOWERS ───────────────────────────────
// Tiny wildflowers scattered in the grass layer
const GRASS_FLOWERS = Array.from({length: CONFIG.particles.grassFlowers}, (_, i) => {
  const types = ['daisy','violet','yellow'];
  const type = types[i % 3];
  const typeConfig = CONFIG.grassFlowerTypes[type];
  return {
    xf: 0.04 + Math.random() * 0.92,
    heightFrac: 0.25 + Math.random() * 0.55,
    stemH: (18 + Math.random() * 28),
    petalCount: typeConfig.petalCount,
    petalLen: typeConfig.petalLen(),
    petalW: 2.5 + Math.random()*2,
    type,
    phase: Math.random()*PI2,
    freq: 0.3+Math.random()*0.5,
    amp: 2+Math.random()*4,
    bloomDelay: CONFIG.grassFlowerBloomDelay(),
    coreColor: typeConfig.coreColor,
    petalColor: typeConfig.petalColor,
    petalColor2: typeConfig.petalColor2,
  };
});

function drawGrassFlower(gf) {
  const openT = clamp((T - gf.bloomDelay) / 1.2, 0, 1);
  if (openT <= 0) return;

  const groundY = CY + H * STEM_BOT_OFFSET_Y + 2;
  const gx = gf.xf * W;
  const sway = Math.sin(T * gf.freq + gf.phase) * gf.amp * SCALE * (0.7 + breezeVal * 0.5);
  const stemH = gf.stemH * SCALE * easeOut(openT, 2);
  const tipX = gx + sway;
  const tipY = groundY - stemH;

  const s = easeOutBack(Math.min(openT, 1));

  // stem
  ctx.save();
  ctx.strokeStyle = `hsl(115,45%,${20+gf.heightFrac*10}%)`;
  ctx.lineWidth = 1.0 * SCALE;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.moveTo(gx, groundY);
  ctx.quadraticCurveTo(gx + sway*0.4, groundY - stemH*0.5, tipX, tipY);
  ctx.stroke();
  ctx.restore();

  // flower head
  ctx.save();
  ctx.translate(tipX, tipY);
  ctx.globalAlpha = Math.min(openT * 1.5, 1) * 0.9;

  const pLen = gf.petalLen * SCALE * s;
  const pW   = gf.petalW   * SCALE * s;
  const pc   = gf.petalCount;

  // petals — drawn as clean filled ellipses rotated around center
  for (let p = 0; p < pc; p++) {
    const pa = (p / pc) * PI2;
    ctx.save();
    ctx.rotate(pa + T * 0.04); // very slow rotation with breeze

    // petal gradient
    const pg = linGrad(0, 0, 0, -pLen, [
      [0,   gf.petalColor2],
      [0.4, gf.petalColor],
      [1,   '#ffffff'],
    ]);
    ctx.fillStyle = pg;
    ctx.beginPath();
    // Ellipse petal — clean and closed, no gaps
    ctx.ellipse(0, -pLen * 0.5, pW * 0.5, pLen * 0.5, 0, 0, PI2);
    ctx.fill();
    // subtle vein
    ctx.strokeStyle = gf.type === 'daisy' ? 'rgba(200,160,80,0.2)' : 'rgba(120,40,180,0.18)';
    ctx.lineWidth = 0.4 * SCALE;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -pLen);
    ctx.stroke();
    ctx.restore();
  }

  // center disk
  const cr = pW * 0.7 * s;
  const diskG = radGrad(0, 0, 0, cr, [
    [0,   gf.coreColor],
    [0.5, gf.type === 'yellow' ? '#e0900a' : (gf.type === 'violet' ? '#7a20b0' : '#d4a020')],
    [1,   'rgba(0,0,0,0.3)'],
  ]);
  ctx.fillStyle = diskG;
  ctx.beginPath();
  ctx.arc(0, 0, cr, 0, PI2);
  ctx.fill();

  // glint on center
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(-cr*0.25, -cr*0.25, cr*0.3, 0, PI2);
  ctx.fill();

  ctx.restore();
}

function drawSoil() {
  const groundY = CY + H * STEM_BOT_OFFSET_Y + 2;
  const soilH   = H - groundY;

  ctx.fillStyle = linGrad(0,groundY,0,H,[
    [0,'rgba(18,9,4,0.0)'],
    [0.05,'#120804'],
    [0.3,'#1a0e08'],
    [0.6,'#140b06'],
    [1,'#0d0704'],
  ]);
  ctx.fillRect(0, groundY, W, soilH);

  const sp = getStemPoints();
  const aoR = 70 * SCALE;
  ctx.fillStyle = radGrad(sp.bx, groundY, 0, aoR, [
    [0,'rgba(0,0,0,0.55)'],
    [1,'rgba(0,0,0,0)'],
  ]);
  ctx.beginPath(); ctx.ellipse(sp.bx, groundY, aoR*1.8, aoR*0.45, 0, 0, PI2);
  ctx.fill();

  SOIL_PARTICLES.forEach(p=>{
    const sx = p.x * W;
    const sy = groundY + 4 + p.depth * soilH * 0.6;
    ctx.globalAlpha = 0.18 + p.depth*0.28;
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.li}%)`;
    ctx.beginPath(); ctx.arc(sx, sy, p.r*SCALE, 0, PI2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.strokeStyle = linGrad(0,groundY,W,groundY,[
    [0,'rgba(80,40,10,0)'],
    [0.3,'rgba(90,50,15,0.35)'],
    [0.7,'rgba(90,50,15,0.35)'],
    [1,'rgba(80,40,10,0)'],
  ]);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY);
  ctx.stroke();
}

function drawGrass() {
  const groundY = CY + H * STEM_BOT_OFFSET_Y + 2;
  ctx.lineCap = 'round';

  // back layer
  GRASS.filter((_,i)=>i%2===0).forEach(g=>{
    const gx = g.xf * W;
    const sway = Math.sin(T*g.freq+g.phase)*g.amp*SCALE * (0.5+breezeVal*0.3);
    const tipX = gx + sway;
    const tipY = groundY - g.h*0.65*SCALE;
    const grad = linGrad(gx,groundY,tipX,tipY,[
      [0,`hsl(${g.hue},${g.sat-10}%,${g.li-6}%)`],
      [0.5,`hsl(${g.hue},${g.sat}%,${g.li}%)`],
      [1,`hsl(${g.hue},${g.sat+8}%,${g.li+10}%)`],
    ]);
    ctx.globalAlpha = 0.45;
    ctx.strokeStyle = grad; ctx.lineWidth = g.w*0.7*SCALE;
    ctx.beginPath(); ctx.moveTo(gx, groundY);
    ctx.quadraticCurveTo(gx+sway*0.4+g.curve*g.h*0.3*SCALE, groundY-g.h*0.35*0.65*SCALE, tipX, tipY);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // back grass flowers (behind front grass)
  GRASS_FLOWERS.filter((_,i) => i % 2 === 0).forEach(gf => drawGrassFlower(gf));

  // front layer
  GRASS.filter((_,i)=>i%2!==0).forEach(g=>{
    const gx = g.xf * W;
    const sway = Math.sin(T*g.freq+g.phase)*g.amp*SCALE * (0.7+breezeVal*0.5);
    const tipX = gx + sway;
    const tipY = groundY - g.h*SCALE;
    const grad = linGrad(gx,groundY,tipX,tipY,[
      [0,`hsl(${g.hue},${g.sat-8}%,${g.li-4}%)`],
      [0.6,`hsl(${g.hue},${g.sat}%,${g.li+4}%)`],
      [1,`hsl(${g.hue+5},${g.sat+12}%,${g.li+18}%)`],
    ]);
    ctx.globalAlpha = 0.82;
    ctx.strokeStyle = grad; ctx.lineWidth = g.w*SCALE;
    ctx.beginPath(); ctx.moveTo(gx, groundY);
    ctx.quadraticCurveTo(gx+sway*0.45+g.curve*g.h*0.25*SCALE, groundY-g.h*0.4*SCALE, tipX, tipY);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // front grass flowers
  GRASS_FLOWERS.filter((_,i) => i % 2 !== 0).forEach(gf => drawGrassFlower(gf));
}

// ── STEM ──────────────────────────────────────────────
function drawStem(progress) {
  if (progress <= 0) return;
  const sp = getStemPoints();
  const tp = cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty, progress);
  const sw = STEM_W();

  ctx.save();
  ctx.lineCap = 'round';

  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = sw * 1.8;
  ctx.filter = 'blur(5px)';
  ctx.beginPath();
  ctx.moveTo(sp.bx+8, sp.by);
  ctx.bezierCurveTo(sp.c1x+10,sp.c1y, sp.c2x+12,sp.c2y, tp.x+14, tp.y);
  ctx.stroke();
  ctx.restore();

  const stemGrad = linGrad(sp.bx, sp.by, tp.x, tp.y, [
    [0,'#1a3d1a'],[0.3,'#2a5e28'],[0.65,'#3a7a34'],[0.85,'#4a9040'],[1,'#3d7d35'],
  ]);
  ctx.strokeStyle = stemGrad;
  ctx.lineWidth = sw;
  ctx.beginPath();
  ctx.moveTo(sp.bx, sp.by);
  ctx.bezierCurveTo(sp.c1x,sp.c1y, sp.c2x,sp.c2y, tp.x, tp.y);
  ctx.stroke();

  ctx.strokeStyle = linGrad(sp.bx,sp.by,tp.x,tp.y,[
    [0,'rgba(120,200,80,0)'],[0.5,'rgba(160,230,100,0.35)'],[1,'rgba(180,240,110,0.18)'],
  ]);
  ctx.lineWidth = sw * 0.35;
  ctx.beginPath();
  ctx.moveTo(sp.bx - sw*0.2, sp.by);
  ctx.bezierCurveTo(sp.c1x-sw*0.2,sp.c1y, sp.c2x-sw*0.2,sp.c2y, tp.x-sw*0.2, tp.y);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = sw * 0.2;
  ctx.beginPath();
  ctx.moveTo(sp.bx + sw*0.35, sp.by);
  ctx.bezierCurveTo(sp.c1x+sw*0.35,sp.c1y, sp.c2x+sw*0.35,sp.c2y, tp.x+sw*0.35, tp.y);
  ctx.stroke();

  if (progress > 0.5) {
    const hairCount = 22;
    ctx.strokeStyle = 'rgba(90,160,60,0.28)';
    ctx.lineWidth = 0.6 * SCALE;
    for (let h=0; h<hairCount; h++) {
      const ht = h/hairCount * progress;
      const pt = cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty,ht);
      const side = h%2===0 ? 1 : -1;
      const len  = (3+Math.sin(h*1.7)*2+2) * SCALE;
      ctx.beginPath();
      ctx.moveTo(pt.x, pt.y);
      ctx.lineTo(pt.x + side*len - breezeVal*2, pt.y - len*0.5);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// ── LEAVES ────────────────────────────────────────────
function drawLeaf(cx,cy,angle,length,width,flip,progress) {
  if (progress<=0) return;
  const s = easeOutBack(Math.min(progress,1));
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate(angle);
  ctx.scale(s * (flip?-1:1), s);

  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#000'; ctx.filter = 'blur(4px)';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(width*0.6,-length*0.15, width*0.8,-length*0.6, 0,-length);
  ctx.bezierCurveTo(-width*0.15,-length*0.55, -width*0.05,-length*0.2, 0,0);
  ctx.fill(); ctx.restore();

  const lGrad = linGrad(0,0,0,-length,[
    [0,'#1a3a16'],[0.35,'#2d6225'],[0.65,'#3a7a2e'],[0.85,'#4a9038'],[1,'#5aaa44'],
  ]);
  ctx.fillStyle = lGrad;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(width*0.7,-length*0.12, width*0.9,-length*0.55, 0,-length);
  ctx.bezierCurveTo(-width*0.12,-length*0.55, -width*0.05,-length*0.18, 0,0);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle = 'rgba(20,60,15,0.55)';
  ctx.lineWidth = 1.2 * SCALE; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-length); ctx.stroke();

  ctx.strokeStyle = 'rgba(20,60,15,0.2)';
  ctx.lineWidth = 0.5 * SCALE;
  for(let v=1;v<=5;v++){
    const vt = v/6;
    const vy = -length*vt;
    const vx = width * (1-vt) * 0.55;
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.quadraticCurveTo(vx*0.6,vy-length*0.06,vx,vy-length*0.04); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.quadraticCurveTo(-vx*0.5,vy-length*0.05,-vx*0.8,vy-length*0.03); ctx.stroke();
  }

  ctx.fillStyle = linGrad(-width*0.3,-length*0.2,0,-length*0.8,[
    [0,'rgba(180,255,140,0)'],[0.4,'rgba(180,255,140,0.12)'],[1,'rgba(255,255,255,0)'],
  ]);
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(width*0.7,-length*0.12, width*0.9,-length*0.55, 0,-length);
  ctx.bezierCurveTo(-width*0.12,-length*0.55, -width*0.05,-length*0.18, 0,0);
  ctx.fill();

  ctx.restore();
}

function drawLeaves(progress) {
  const sp = getStemPoints();
  const p1 = cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty, 0.38);
  const p2 = cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty, 0.58);
  const lLen = 62*SCALE, lW = 28*SCALE;
  drawLeaf(p1.x,p1.y, -0.55+breezeVal*0.04, lLen*1.1, lW, true,  progress);
  drawLeaf(p2.x,p2.y,  0.62+breezeVal*0.03, lLen,     lW, false, progress);
}

// ── FIXED PETAL DRAWING ───────────────────────────────
// Key fix: use a single clean closed bezier path for each petal,
// no loop-based edge construction which caused gaps/mismatches.
// The petal is drawn as two bezier curves meeting at tip and base.

function drawPetal(i, totalPetals, cx, cy, baseAngle, length, width, openT, layerDepth) {
  if (openT <= 0.001) return;

  const angle = baseAngle + (i / totalPetals) * PI2;
  // individual petal breeze flutter
  const flutter = breezeVal * Math.sin(i * 0.9 + T * 1.2) * 2.5 * SCALE;
  const fCX = cx + Math.cos(angle) * flutter;
  const fCY = cy + Math.sin(angle) * flutter * 0.4;

  const L   = length * Math.min(openT * 1.3, 1);
  const W2  = width  * Math.min(openT * 1.2, 1);
  // opening tilt: petals start angled upward, open to flat/slightly back
  const tilt = lerp(-0.32, 0.08, openT);
  // tip curl increases as petal opens
  const curl = openT * length * 0.12;

  ctx.save();
  ctx.translate(fCX, fCY);
  ctx.rotate(angle + tilt);

  // ── Single clean closed petal path ──
  // Base at (0,0), tip at (curl, -L)
  // Left edge: control points arc left
  // Right edge: control points arc right
  // Both curves meet at tip — guaranteed closed, no gaps.
  function petalPath() {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    // Left side bezier
    ctx.bezierCurveTo(
      -W2 * 0.9,  -L * 0.15,
      -W2 * 0.65, -L * 0.75,
       curl * 0.4, -L + curl
    );
    // Right side bezier (reversed, from tip back to base)
    ctx.bezierCurveTo(
       W2 * 0.65, -L * 0.75,
       W2 * 0.9,  -L * 0.15,
       0, 0
    );
    ctx.closePath();
  }

  // Drop shadow
  ctx.save();
  ctx.globalAlpha = 0.13 * layerDepth * openT;
  ctx.fillStyle = '#1a0510';
  ctx.filter = `blur(${5 * SCALE}px)`;
  ctx.translate(4 * SCALE * layerDepth, 5 * SCALE * layerDepth);
  petalPath();
  ctx.fill();
  ctx.restore();

  // Main petal fill — rich rose gradient from base to tip
  const coreGrad = linGrad(0, 0, 0, -L, [
    [0,   '#5e0d2e'],
    [0.15,'#8b1a42'],
    [0.38,'#b83060'],
    [0.62,'#d44e75'],
    [0.80,'#e8738f'],
    [0.92,'#f5a0b5'],
    [1,   '#ffd0db'],
  ]);
  ctx.fillStyle = coreGrad;
  petalPath();
  ctx.fill();

  // Subsurface scattering — warm light bleeding through tip & edges
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  // Tip SSS
  ctx.fillStyle = linGrad(0, -L * 0.55, 0, -L, [
    [0,   'rgba(255,140,110,0)'],
    [0.5, 'rgba(255,120,100,0.07)'],
    [1,   'rgba(255,210,170,0.28)'],
  ]);
  petalPath();
  ctx.fill();
  // Edge SSS (sides glow warm)
  ctx.fillStyle = linGrad(-W2 * 0.55, -L * 0.35, W2 * 0.55, -L * 0.35, [
    [0,   'rgba(255,90,80,0.14)'],
    [0.45,'rgba(255,255,255,0)'],
    [0.55,'rgba(255,255,255,0)'],
    [1,   'rgba(255,90,80,0.14)'],
  ]);
  petalPath();
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();

  // Vein network
  ctx.save();
  ctx.lineCap = 'round';
  // Midrib
  ctx.strokeStyle = 'rgba(130,20,45,0.32)';
  ctx.lineWidth   = 0.9 * SCALE;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(curl * 0.15, -L * 0.48, curl * 0.4, -L + curl);
  ctx.stroke();
  // Lateral veins
  const veinCount = 5;
  for (let v = 0; v < veinCount; v++) {
    const vt  = (v + 1) / (veinCount + 1);
    const vy  = -L * vt * 0.9;
    const vxL = -W2 * (0.5 - vt * 0.28);
    const vxR =  W2 * (0.5 - vt * 0.28);
    ctx.strokeStyle = `rgba(120,18,42,${0.15 - vt * 0.06})`;
    ctx.lineWidth = (0.65 - vt * 0.15) * SCALE;
    ctx.beginPath(); ctx.moveTo(0, vy);
    ctx.quadraticCurveTo(vxL * 0.55, vy - L * 0.038, vxL, vy - L * 0.018); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, vy);
    ctx.quadraticCurveTo(vxR * 0.55, vy - L * 0.038, vxR, vy - L * 0.018); ctx.stroke();
  }
  ctx.restore();

  // Specular highlight — waxy surface, golden-hour light from upper-left
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = linGrad(-W2 * 0.28, -L * 0.18, W2 * 0.05, -L * 0.62, [
    [0,   'rgba(255,240,200,0)'],
    [0.25,'rgba(255,240,200,0.14)'],
    [0.55,'rgba(255,255,255,0.20)'],
    [1,   'rgba(255,255,255,0)'],
  ]);
  petalPath();
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();

  ctx.restore();
}

// Dew drops
const DEW_DROPS = Array.from({length:CONFIG.dewDrops.count},()=>({
  petalIdx: Math.floor(Math.random()*8),
  tAlong:   0.35 + Math.random()*0.45,
  side:     (Math.random()-0.5)*0.65,
  r:        CONFIG.dewDrops.minRadius + Math.random()*CONFIG.dewDrops.maxRadius,
  glintOff: Math.random()*PI2,
}));

function drawDewDropOnPetal(cx, cy, angle, length, width, openT, drop) {
  if (openT < 0.82) return;
  const L   = length * Math.min(openT*1.3,1);
  const W2  = width  * Math.min(openT*1.2,1);
  const curl= openT * length * 0.12;
  const tilt= lerp(-0.32, 0.08, openT);

  const t  = drop.tAlong;
  // Interpolate along midrib
  const dx = drop.side * W2 * (1 - t * 0.8);
  const dy = -(L * t) + curl * t;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle + tilt);
  ctx.translate(dx, dy);

  const r = drop.r * SCALE;

  const dGrad = radGrad(-r*0.3,-r*0.3,0,r*1.05,[
    [0,'rgba(255,255,255,0.88)'],
    [0.3,'rgba(220,245,255,0.55)'],
    [0.7,'rgba(180,220,255,0.22)'],
    [1,'rgba(150,190,255,0.02)'],
  ]);
  ctx.fillStyle = dGrad;
  ctx.beginPath(); ctx.arc(0,0,r,0,PI2); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(
    -r*0.32*Math.cos(drop.glintOff),
    -r*0.32*Math.sin(drop.glintOff),
    r*0.22, 0, PI2
  );
  ctx.fill();

  ctx.save(); ctx.globalAlpha = 0.18;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.filter = `blur(${r*0.65}px)`;
  ctx.beginPath(); ctx.ellipse(r*0.1, r*0.48, r*0.68, r*0.22, 0, 0, PI2);
  ctx.fill(); ctx.restore();

  ctx.restore();
}

// ── FULL FLOWER ───────────────────────────────────────
const PETAL_COUNT_OUTER = CONFIG.petals.outer.count;
const PETAL_COUNT_MID   = CONFIG.petals.mid.count;
const PETAL_COUNT_INNER = CONFIG.petals.inner.count;

function petalOpenT(i, total, layerStart, layerGap, dur) {
  const pStart = layerStart + i * layerGap;
  return clamp((T - pStart) / dur, 0, 1);
}

function drawFlower() {
  const hx = CX + breezeVal * 28;
  const hy = CY;

  // Sepals
  const sepalT = clamp((T - BLOOM_START) / 0.8, 0, 1);
  if (sepalT > 0) {
    for (let s = 0; s < 5; s++) {
      const sa   = (s/5)*PI2 + breezeVal*0.04;
      const sLen = 28*SCALE*easeOut(sepalT,2);
      ctx.save();
      ctx.translate(hx,hy); ctx.rotate(sa);
      ctx.fillStyle = linGrad(0,0,0,-sLen,[
        [0,'#2a5520'],[0.6,'#3d7a2e'],[1,'#4a9038'],
      ]);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(-6*SCALE,-sLen*0.3,-5*SCALE,-sLen*0.8,0,-sLen);
      ctx.bezierCurveTo(5*SCALE,-sLen*0.8,6*SCALE,-sLen*0.3,0,0);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // OUTER PETALS
  const outerLen = CONFIG.petals.outer.length(SCALE), outerW = CONFIG.petals.outer.width(SCALE);
  for (let i = 0; i < PETAL_COUNT_OUTER; i++) {
    const ot  = easeOut(petalOpenT(i, PETAL_COUNT_OUTER, BLOOM_START+CONFIG.petals.outer.startTime, CONFIG.petals.outer.layerGap, CONFIG.petals.outer.duration), 2);
    const ang = (i / PETAL_COUNT_OUTER) * PI2;
    drawPetal(i, PETAL_COUNT_OUTER, hx, hy, ang, outerLen, outerW, ot, CONFIG.petals.outer.depthFactor);
  }

  // Dew on outer petals
  DEW_DROPS.forEach(d => {
    const ot  = easeOut(petalOpenT(d.petalIdx, PETAL_COUNT_OUTER, BLOOM_START+0.4, 0.22, 1.1), 2);
    if (ot < 0.82) return;
    const ang = (d.petalIdx / PETAL_COUNT_OUTER) * PI2;
    const flutter = breezeVal * Math.sin(d.petalIdx * 0.9 + T * 1.2) * 2.5 * SCALE;
    drawDewDropOnPetal(
      hx + Math.cos(ang) * flutter,
      hy + Math.sin(ang) * flutter * 0.4,
      ang, outerLen, outerW, ot, d
    );
  });

  // MID PETALS
  const midLen = CONFIG.petals.mid.length(SCALE), midW = CONFIG.petals.mid.width(SCALE);
  for (let i = 0; i < PETAL_COUNT_MID; i++) {
    const ot  = easeOut(petalOpenT(i, PETAL_COUNT_MID, BLOOM_START+CONFIG.petals.mid.startTime, CONFIG.petals.mid.layerGap, CONFIG.petals.mid.duration), 2);
    const ang = (i / PETAL_COUNT_MID) * PI2 + Math.PI / 8;
    drawPetal(i, PETAL_COUNT_MID, hx, hy, ang, midLen, midW, ot, CONFIG.petals.mid.depthFactor);
  }

  // INNER PETALS
  const innerLen = CONFIG.petals.inner.length(SCALE), innerW = CONFIG.petals.inner.width(SCALE);
  for (let i = 0; i < PETAL_COUNT_INNER; i++) {
    const ot  = easeOut(petalOpenT(i, PETAL_COUNT_INNER, BLOOM_START+CONFIG.petals.inner.startTime, CONFIG.petals.inner.layerGap, CONFIG.petals.inner.duration), 2);
    const ang = (i / PETAL_COUNT_INNER) * PI2 + Math.PI / 6;
    drawPetal(i, PETAL_COUNT_INNER, hx, hy, ang, innerLen, innerW, ot, CONFIG.petals.inner.depthFactor);
  }

  // STAMENS
  const stamenT = clamp((T-(BLOOM_START+2.8))/0.6, 0, 1);
  if (stamenT > 0) {
    const filCount = 22;
    for (let f = 0; f < filCount; f++) {
      const fa   = (f / filCount) * PI2 + T * 0.12;
      const fLen = (14+Math.sin(f*1.7)*4)*SCALE * easeOutBack(Math.min(stamenT*1.3,1));
      const fW   = (3.5+Math.cos(f*2.1)*1)*SCALE;
      const fx2  = hx + Math.cos(fa)*fW;
      const fy2  = hy + Math.sin(fa)*fW;
      ctx.save();
      ctx.strokeStyle = linGrad(fx2,fy2,fx2+Math.cos(fa)*fLen,fy2+Math.sin(fa)*fLen,[
        [0,'rgba(220,160,40,0.6)'],[1,'rgba(255,210,80,0.9)'],
      ]);
      ctx.lineWidth = 0.9*SCALE; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(fx2,fy2);
      ctx.lineTo(fx2+Math.cos(fa)*fLen, fy2+Math.sin(fa)*fLen);
      ctx.stroke();
      const ax = fx2+Math.cos(fa)*fLen, ay = fy2+Math.sin(fa)*fLen;
      ctx.fillStyle = radGrad(ax-0.5*SCALE,ay-0.5*SCALE,0,2.8*SCALE,[
        [0,'#ffe880'],[0.5,'#d4a030'],[1,'rgba(160,80,0,0)'],
      ]);
      ctx.beginPath(); ctx.arc(ax,ay,2.5*SCALE,0,PI2); ctx.fill();
      ctx.restore();
    }
  }

  // CENTER DISK
  const centerT = clamp((T-(BLOOM_START+2.2))/0.7, 0, 1);
  if (centerT > 0) {
    const cs = easeOutBack(Math.min(centerT,1));
    const cr = 18*SCALE * cs;

    ctx.save(); ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#000'; ctx.filter=`blur(${8*SCALE}px)`;
    ctx.beginPath(); ctx.arc(hx+3*SCALE,hy+3*SCALE,cr,0,PI2); ctx.fill();
    ctx.restore();

    const diskGrad = radGrad(hx-4*SCALE,hy-4*SCALE,0,cr,[
      [0,'#ffe89a'],[0.3,'#f5c842'],[0.6,'#d4920a'],[0.85,'#a06500'],[1,'#7a4800'],
    ]);
    ctx.fillStyle = diskGrad;
    ctx.beginPath(); ctx.arc(hx,hy,cr,0,PI2); ctx.fill();

    ctx.save();
    for (let p = 0; p < 28; p++) {
      const pa = (p/28)*PI2 + T*0.08;
      const pr = (4 + (p%3)*3.5) * SCALE * cs;
      ctx.fillStyle = `rgba(180,100,0,${0.3+Math.sin(p)*0.15})`;
      ctx.beginPath(); ctx.arc(hx+Math.cos(pa)*pr*0.88, hy+Math.sin(pa)*pr*0.88, 0.9*SCALE, 0, PI2); ctx.fill();
    }
    ctx.restore();

    ctx.fillStyle = radGrad(hx-5*SCALE,hy-5*SCALE,0,cr*0.6,[
      [0,'rgba(255,255,220,0.55)'],[1,'rgba(255,255,220,0)'],
    ]);
    ctx.beginPath(); ctx.arc(hx,hy,cr,0,PI2); ctx.fill();

    const pulseR = cr * (1.8 + 0.15*Math.sin(T*2.2));
    ctx.fillStyle = radGrad(hx,hy,cr*0.5,pulseR,[
      [0,`rgba(255,180,30,${0.12+0.06*Math.sin(T*2.2)})`],
      [1,'rgba(255,180,30,0)'],
    ]);
    ctx.beginPath(); ctx.arc(hx,hy,pulseR,0,PI2); ctx.fill();
  }
}

// ── POLLEN PARTICLES ──────────────────────────────────
const POLLEN = Array.from({length:CONFIG.particles.pollen},()=>({
  x: 0.5+(Math.random()-0.5)*0.15, y: 0.42+Math.random()*0.1,
  vx:(Math.random()-0.5)*0.15, vy:-0.05-Math.random()*0.15,
  r: CONFIG.pollen.minSize+Math.random()*CONFIG.pollen.maxSize,
  life:0, maxLife:CONFIG.pollen.minLife+Math.random()*CONFIG.pollen.maxLife,
  hue: CONFIG.pollen.hueRange[0]+Math.random()*(CONFIG.pollen.hueRange[1]-CONFIG.pollen.hueRange[0]),
  born: CONFIG.pollen.bornAfter(),
}));

function updateAndDrawPollen() {
  const dt = 0.016;
  POLLEN.forEach(p=>{
    if(T < p.born) return;
    if(p.life >= p.maxLife){
      p.x = 0.5+(Math.random()-0.5)*0.12;
      p.y = 0.44+Math.random()*0.08;
      p.vx = (Math.random()-0.5)*0.12;
      p.vy = -0.06-Math.random()*0.12;
      p.life = 0; p.born = T + Math.random()*3;
      return;
    }
    p.life += dt;
    p.x += (p.vx + breezeVal*0.012) * dt;
    p.y += p.vy * dt;
    p.vy += 0.008*dt;
    p.vx += (Math.random()-0.5)*0.01;

    const lt = p.life/p.maxLife;
    const alpha = lt<0.1 ? lt*10 : lt>0.8 ? (1-lt)*5 : 1;
    ctx.globalAlpha = alpha*0.55;
    ctx.fillStyle = `hsl(${p.hue},90%,65%)`;
    ctx.beginPath();
    ctx.arc(p.x*W, p.y*H, p.r*SCALE, 0, PI2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ── BOKEH ─────────────────────────────────────────────
const BOKEH = Array.from({length:CONFIG.particles.bokeh},()=>{
  const warm = Math.random()<CONFIG.bokeh.warmRatio;
  return {
    x: Math.random()*W, y: Math.random()*H*0.9,
    r: (CONFIG.bokeh.minRadius+Math.random()*CONFIG.bokeh.maxRadius)*SCALE,
    opacity: CONFIG.bokeh.minOpacity+Math.random()*CONFIG.bokeh.maxOpacity,
    freq: CONFIG.bokeh.minFreq+Math.random()*(CONFIG.bokeh.maxFreq-CONFIG.bokeh.minFreq), 
    phase: Math.random()*PI2,
    color: warm
      ? `rgba(255,${140+Math.random()*60|0},${30+Math.random()*40|0},1)`
      : `rgba(${60+Math.random()*40|0},${80+Math.random()*60|0},${200+Math.random()*55|0},1)`,
  };
});

function drawBackground() {
  ctx.fillStyle = '#06030a';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = radGrad(W*0.72, H*0.08, 0, H*0.7, [
    [0,'rgba(255,160,50,0.14)'],[0.3,'rgba(255,120,40,0.07)'],[0.7,'rgba(200,80,30,0.03)'],[1,'rgba(0,0,0,0)'],
  ]);
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = radGrad(W*0.12, H*0.05, 0, H*0.55,[
    [0,'rgba(80,120,200,0.09)'],[0.5,'rgba(60,90,160,0.04)'],[1,'rgba(0,0,0,0)'],
  ]);
  ctx.fillRect(0,0,W,H);

  const groundY = CY + H*STEM_BOT_OFFSET_Y;
  ctx.fillStyle = linGrad(0, groundY-80, 0, groundY+40,[
    [0,'rgba(0,0,0,0)'],[0.6,'rgba(20,10,5,0.3)'],[1,'rgba(20,10,5,0.55)'],
  ]);
  ctx.fillRect(0, groundY-80, W, 120);

  BOKEH.forEach(b=>{
    const pulse = 0.6+0.4*Math.sin(T*b.freq+b.phase);
    ctx.globalAlpha = b.opacity * pulse;
    ctx.fillStyle = radGrad(b.x,b.y,0,b.r,[
      [0,b.color],
      [0.5,b.color.replace('1)','0.3)')],
      [1,'rgba(0,0,0,0)'],
    ]);
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,PI2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── FLOATING PILLS ────────────────────────────────────
const MESSAGES = CONFIG.messages;
let msgIdx = 0;
function spawnPill() {
  const pill = document.createElement('div');
  pill.className = 'pill';
  const dur = CONFIG.messagePillDuration();
  pill.style.left = (5+Math.random()*68)+'vw';
  pill.style.top  = (52+Math.random()*20)+'vh';
  pill.style.animationDuration = dur+'s';
  pill.textContent = MESSAGES[msgIdx++%MESSAGES.length];
  document.body.appendChild(pill);
  setTimeout(()=>pill.remove(),(dur+1)*1000);
}
setTimeout(()=>{ spawnPill(); setInterval(spawnPill,CONFIG.messagePillInterval); }, BLOOM_DONE*1000+CONFIG.messagePillDelay*1000);

// ── CURSOR ────────────────────────────────────────────
const cur = document.getElementById('cursor');
const curT= document.getElementById('cursor-trail');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
  curT.style.left=e.clientX+'px'; curT.style.top=e.clientY+'px';
});

// ── CLICK SPARKS ──────────────────────────────────────
document.addEventListener('click',e=>{
  for(let i=0;i<14;i++){
    const sp = document.createElement('div');
    sp.className = 'spark';
    const angle = (i/14)*PI2 + Math.random()*0.5;
    const dist  = 30+Math.random()*60;
    sp.style.cssText = `
      left:${e.clientX}px; top:${e.clientY}px;
      --tx:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px);
      background:${Math.random()<0.5?'#d4a853':'#f08090'};
      box-shadow:0 0 4px ${Math.random()<0.5?'#d4a853':'#f08090'};
      animation-duration:${0.5+Math.random()*0.4}s;
      width:${2+Math.random()*4}px; height:${2+Math.random()*4}px;
    `;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1000);
  }
});

// ── MAIN LOOP ─────────────────────────────────────────
let lastTime = null;
function frame(now) {
  if(!startTime) startTime=now;
  if(!lastTime)  lastTime=now;
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime=now;
  T = (now-startTime)/1000;

  updateBreeze(dt);

  drawBackground();

  const stemT   = clamp((T-CONFIG.animation.stem.startTime)/CONFIG.animation.stem.duration,0,1);
  const leafT   = clamp((T-CONFIG.animation.leaves.startTime)/CONFIG.animation.leaves.duration,0,1);
  const flowerT = clamp((T-BLOOM_START)/0.5,0,1);

  drawSoil();
  drawStem(easeInOut(stemT));
  if(leafT>0) drawLeaves(easeOut(leafT,2));
  if(flowerT>0) drawFlower();
  drawGrass();
  updateAndDrawPollen();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
