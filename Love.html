<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You, With Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0608;font-family:'EB Garamond',Georgia,serif;cursor:none;}

#cursor{position:fixed;width:8px;height:8px;background:rgba(212,168,83,0.7);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(212,168,83,0.5);}
#cursor-trail{position:fixed;width:28px;height:28px;border:1px solid rgba(212,168,83,0.25);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .18s ease,top .18s ease;}
#mainCanvas{position:fixed;inset:0;width:100%;height:100%;display:block;}

.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 70% 70% at 50% 45%,transparent 0%,rgba(4,2,3,.35) 60%,rgba(4,2,3,.82) 100%);}
.grain{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");background-size:220px;animation:grainShift .12s steps(1) infinite;}
@keyframes grainShift{0%{background-position:0 0}20%{background-position:-60px 40px}40%{background-position:80px -30px}60%{background-position:-40px -60px}80%{background-position:70px 50px}100%{background-position:0 0}}

.chroma{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:0;animation:chromaIn 2s ease 8s forwards;mix-blend-mode:screen;background:radial-gradient(ellipse 40% 20% at 30% 20%,rgba(255,30,80,.04) 0%,transparent 70%),radial-gradient(ellipse 30% 15% at 70% 80%,rgba(30,80,255,.04) 0%,transparent 70%);}
@keyframes chromaIn{to{opacity:1}}

#ui{position:fixed;inset:0;z-index:5;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:clamp(32px,6vh,64px);}
.headline-wrap{text-align:center;opacity:0;animation:titleReveal 2.2s cubic-bezier(.16,1,.3,1) 1.2s forwards;}
@keyframes titleReveal{from{opacity:0;transform:translateY(22px) scale(.97);filter:blur(6px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.headline{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4.5vw,3.4rem);font-weight:400;font-style:italic;letter-spacing:.06em;color:#f5ede0;text-shadow:0 2px 40px rgba(212,168,83,.5),0 0 80px rgba(212,168,83,.2),0 1px 0 rgba(0,0,0,.8);line-height:1.1;}
.headline span{color:#d4a853;font-style:normal;font-weight:700;}
.subtitle{margin-top:10px;font-family:'EB Garamond',serif;font-size:clamp(.85rem,1.8vw,1.1rem);font-style:italic;letter-spacing:.28em;color:rgba(212,168,83,.55);text-transform:uppercase;}

.signature{position:fixed;bottom:clamp(28px,5vh,52px);left:0;right:0;text-align:center;z-index:5;pointer-events:none;opacity:0;animation:fadeUp 1.8s ease 9s forwards;}
.signature p{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.8rem,1.5vw,1rem);color:rgba(245,237,224,.3);letter-spacing:.14em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.pill{position:fixed;font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(.85rem,1.8vw,1.05rem);color:rgba(245,237,224,.88);background:rgba(10,6,8,.55);border:.5px solid rgba(212,168,83,.22);backdrop-filter:blur(14px);border-radius:999px;padding:8px 22px 9px;pointer-events:none;z-index:6;white-space:nowrap;animation:pillRise linear forwards;letter-spacing:.03em;}
.pill::before{content:'';display:inline-block;width:4px;height:4px;background:#d4a853;border-radius:50%;margin-right:10px;vertical-align:middle;box-shadow:0 0 6px #d4a853;animation:dotBlink 2.4s ease-in-out infinite;}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pillRise{0%{opacity:0;transform:translateY(0) scale(.93)}10%{opacity:1;transform:translateY(-14px) scale(1)}78%{opacity:1;transform:translateY(-110px) scale(1)}100%{opacity:0;transform:translateY(-160px) scale(.96)}}

.spark{position:fixed;pointer-events:none;z-index:8;border-radius:50%;animation:sparkFly linear forwards;}
@keyframes sparkFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:var(--tx) scale(0)}}

/* ── Music button ── */
#musicBtn{
  position:fixed;bottom:clamp(28px,5vh,52px);right:clamp(20px,3vw,40px);
  z-index:10;cursor:pointer;
  width:44px;height:44px;border-radius:50%;
  background:rgba(10,6,8,.62);
  border:1px solid rgba(212,168,83,.28);
  backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s,box-shadow .3s,background .3s;
  box-shadow:0 0 0 rgba(212,168,83,0);
}
#musicBtn:hover{border-color:rgba(212,168,83,.65);box-shadow:0 0 18px rgba(212,168,83,.2);}
#musicBtn.playing{border-color:rgba(212,168,83,.7);box-shadow:0 0 22px rgba(212,168,83,.3);animation:musicPulse 2s ease-in-out infinite;}
@keyframes musicPulse{0%,100%{box-shadow:0 0 14px rgba(212,168,83,.2)}50%{box-shadow:0 0 28px rgba(212,168,83,.45)}}
#musicBtn svg{width:20px;height:20px;fill:rgba(212,168,83,.8);transition:fill .3s;}
#musicBtn:hover svg,#musicBtn.playing svg{fill:rgba(212,168,83,1);}
#musicBtn.hidden{display:none;}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="mainCanvas"></canvas>
<div class="vignette"></div>
<div class="grain"></div>
<div class="chroma"></div>

<div id="ui">
  <div class="headline-wrap">
    <h1 class="headline" id="headlineEl">For You, With <span>Love</span></h1>
    <p class="subtitle" id="subtitleEl"></p>
  </div>
</div>
<div class="signature"><p id="signatureEl"></p></div>

<!-- Music button (hidden if no URL configured) -->
<button id="musicBtn" class="hidden" aria-label="Toggle music" title="Toggle music">
  <!-- note icon -->
  <svg id="iconNote" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  <!-- pause icon (hidden by default) -->
  <svg id="iconPause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
</button>

<script>
/* ═══════════════════════════════════════════════════════
   FOR YOU, WITH LOVE  —  main renderer
   All CONFIG values loaded from config.js
═══════════════════════════════════════════════════════ */

// ── Subtitle / signature from config ─────────────────
document.getElementById('subtitleEl').textContent   = CONFIG.recipientName;
document.getElementById('signatureEl').textContent  = '— with love, ' + CONFIG.senderName;

// ── Canvas setup ─────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY, SCALE;

function resize() {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  CX = W / 2;
  CY = H * 0.46;
  SCALE = Math.min(W, H) / 700;
}
resize();
addEventListener('resize', () => { resize(); buildGrass(); buildSharpGrass(); });

// ── Math helpers ─────────────────────────────────────
const PI2 = Math.PI * 2;
const lerp    = (a,b,t) => a + (b-a)*t;
const clamp   = (v,a,b) => Math.max(a, Math.min(b, v));
const easeOut = (t,p=3) => 1 - Math.pow(1-t, p);
const easeInOut = t => t < .5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2)+1;
const easeOutBack = t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };
const smoothstep = (a,b,t) => { const x=clamp((t-a)/(b-a),0,1); return x*x*(3-2*x); };

function radGrad(x,y,r0,r1,stops) {
  r0 = Math.max(0, r0||0); r1 = Math.max(r0+0.001, r1||1);
  const g = ctx.createRadialGradient(x,y,r0,x,y,r1);
  stops.forEach(([t,c]) => g.addColorStop(clamp(t,0,1), c));
  return g;
}
function linGrad(x0,y0,x1,y1,stops) {
  const g = ctx.createLinearGradient(x0,y0,x1,y1);
  stops.forEach(([t,c]) => g.addColorStop(clamp(t,0,1), c));
  return g;
}

// ── Time & constants ──────────────────────────────────
let T = 0, startTime = null, lastTime = null;
const BLOOM_START = CONFIG.BLOOM_START;
const BLOOM_DONE  = CONFIG.BLOOM_DONE;
const STEM_BOT    = CONFIG.stem.bottomOffsetY;

// ── Breeze — smooth fade-in from BLOOM_START, no hard jump ──
// breezeRaw builds up slowly; breezeVal is the gated/faded version.
let breezeRaw = 0, breezeGust = 0, breezeGustTarget = 0, breezeGustTimer = 4;
let breezeVal = 0;

function updateBreeze(dt) {
  // Gust system active from BLOOM_DONE (full gusts only after full bloom)
  if (T >= BLOOM_DONE) {
    breezeGustTimer -= dt;
    if (breezeGustTimer <= 0) {
      breezeGustTarget = (Math.random() - 0.38) * 1.0;
      breezeGustTimer  = 3.5 + Math.random() * 5;
    }
    breezeGust += (breezeGustTarget - breezeGust) * 0.008;
  }

  // Raw breeze always runs — never zero-jumps
  breezeRaw =
    Math.sin(T * 0.29       ) * 0.55 +
    Math.sin(T * 0.71 + 1.3 ) * 0.22 +
    Math.sin(T * 1.87 + 2.8 ) * 0.07 +
    breezeGust;

  // Smooth envelope: tiny from start, fades up through bloom
  const fadeIn = smoothstep(
    CONFIG.breeze.fadeInStart,
    CONFIG.breeze.fadeInEnd,
    T
  );
  const preFade = smoothstep(BLOOM_START, CONFIG.breeze.fadeInStart, T);

  breezeVal = breezeRaw * (CONFIG.breeze.preBreezeAmp + fadeIn * (1 - CONFIG.breeze.preBreezeAmp))
            + breezeRaw * preFade * 0.35; // gentle ramp in the middle window
}

// ── Stem helpers ─────────────────────────────────────
function getStemPoints(bv, baseY) {
  const by = baseY;
  const bx = CX + bv * 4;
  const ty = CY;
  const tx = CX + bv * 28;
  return { bx, by, tx, ty,
    c1x: bx + (tx-bx)*0.15 + bv*8,  c1y: lerp(by,ty,0.4),
    c2x: tx - (tx-bx)*0.1  + bv*18, c2y: lerp(by,ty,0.7) };
}
function getStemPointsSF(bv, baseY, topY, topX) {
  // secondary flower — different top position
  const by = baseY, bx = topX + bv * 2;
  return { bx, by, tx: topX + bv*14, ty: topY,
    c1x: bx + (topX-bx)*0.2 + bv*4, c1y: lerp(by,topY,0.35),
    c2x: topX - (topX-bx)*0.1 + bv*10, c2y: lerp(by,topY,0.68) };
}
function cubicBez(p0x,p0y,p1x,p1y,p2x,p2y,p3x,p3y,t) {
  const mt = 1-t;
  return {
    x: mt*mt*mt*p0x + 3*mt*mt*t*p1x + 3*mt*t*t*p2x + t*t*t*p3x,
    y: mt*mt*mt*p0y + 3*mt*mt*t*p1y + 3*mt*t*t*p2y + t*t*t*p3y,
  };
}

// ── Soil particles ────────────────────────────────────
const SOIL = Array.from({length: CONFIG.particles.soil}, () => ({
  x: Math.random(), depth: Math.random(),
  r: 0.8+Math.random()*2.2, hue:18+Math.random()*22, sat:30+Math.random()*25, li:8+Math.random()*14,
}));

// ── Regular short grass ───────────────────────────────
let GRASS = [];
function buildGrass() {
  const count = Math.floor(W * CONFIG.grass.countPerPx) + CONFIG.grass.countBase;
  GRASS = Array.from({length: count}, () => ({
    xf: Math.random(),
    h:  (CONFIG.grass.minH + Math.random()*CONFIG.grass.maxH) * (CONFIG.grass.hVar + Math.random()*CONFIG.grass.hVar),
    w:  CONFIG.grass.minW + Math.random()*(CONFIG.grass.maxW - CONFIG.grass.minW),
    hue: CONFIG.grass.hue[0] + Math.random()*(CONFIG.grass.hue[1]-CONFIG.grass.hue[0]),
    sat: CONFIG.grass.sat[0] + Math.random()*(CONFIG.grass.sat[1]-CONFIG.grass.sat[0]),
    li:  CONFIG.grass.lit[0] + Math.random()*(CONFIG.grass.lit[1]-CONFIG.grass.lit[0]),
    phase: Math.random()*PI2, freq: CONFIG.grass.minFreq + Math.random()*(CONFIG.grass.maxFreq-CONFIG.grass.minFreq),
    amp:   CONFIG.grass.minAmp + Math.random()*(CONFIG.grass.maxAmp-CONFIG.grass.minAmp),
    curve: (Math.random()-0.5)*0.4,
  }));
}
buildGrass();

// ── Tall sharp grass ──────────────────────────────────
// Clusters placed near each flower base for realism
let SHARP_GRASS = [];
function buildSharpGrass() {
  const cfg = CONFIG.sharpGrass;
  // Anchor x positions for clustering: main flower (CX) and secondary flower
  const mainX  = CX / W;
  const sfX    = CONFIG.secondaryFlower.xFrac;
  const cr     = cfg.clusterRadius;

  SHARP_GRASS = Array.from({length: cfg.count}, (_, i) => {
    // Every 3rd blade is a free-range blade; others cluster near flowers
    let xf;
    if      (i % 3 === 0) xf = Math.random();                          // scattered
    else if (i % 3 === 1) xf = mainX + (Math.random()-0.5) * cr * 2;  // near main
    else                  xf = sfX   + (Math.random()-0.5) * cr * 2;  // near secondary

    xf = clamp(xf, 0.01, 0.99);

    // Blades close to a flower lean slightly outward for naturalism
    const nearMain = Math.abs(xf - mainX) < cr;
    const lean = nearMain ? (xf - mainX) * 1.2 : (Math.random()-0.5)*0.5;

    return {
      xf, lean,
      h:    cfg.minH + Math.random()*(cfg.maxH - cfg.minH),
      w:    cfg.minW + Math.random()*(cfg.maxW - cfg.minW),
      hue:  cfg.hue[0] + Math.random()*(cfg.hue[1]-cfg.hue[0]),
      sat:  cfg.sat[0] + Math.random()*(cfg.sat[1]-cfg.sat[0]),
      li:   cfg.lit[0] + Math.random()*(cfg.lit[1]-cfg.lit[0]),
      phase: Math.random()*PI2,
      freq:  cfg.minFreq + Math.random()*(cfg.maxFreq - cfg.minFreq),
      amp:   cfg.minAmp  + Math.random()*(cfg.maxAmp  - cfg.minAmp),
    };
  });
}
buildSharpGrass();

// ── Small wildflowers ─────────────────────────────────
const FLOWER_TYPES = Object.keys(CONFIG.grassFlowerTypes);
const GRASS_FLOWERS = Array.from({length: CONFIG.particles.grassFlowers}, (_, i) => {
  const type = FLOWER_TYPES[i % FLOWER_TYPES.length];
  const tc   = CONFIG.grassFlowerTypes[type];
  return {
    xf: 0.03 + Math.random()*0.94,
    stemH: 16 + Math.random()*30,
    type, tc,
    petalLen: tc.lenBase + Math.random()*tc.lenRand,
    petalW:   2.2 + Math.random()*2.0,
    phase: Math.random()*PI2, freq: 0.3+Math.random()*0.5, amp: 2+Math.random()*5,
    bloomDelay: CONFIG.grassFlowerBloomDelay(BLOOM_DONE),
    layer: i%2, // 0=behind front grass, 1=in front
  };
});

// ══════════════════════════════════════════════════════
// DEW DROPS — fixed transform chain
// Each drop stores which petal it lives on.
// drawDewDrop receives the exact same (fCX,fCY,angle,tilt) that
// drawPetal used, so the transform stack is identical.
// Position inside petal is sampled along the midrib quadratic.
// ══════════════════════════════════════════════════════
const PETAL_COUNT_OUTER = CONFIG.petals.outer.count;
const PETAL_COUNT_MID   = CONFIG.petals.mid.count;
const PETAL_COUNT_INNER = CONFIG.petals.inner.count;

const DEW_DROPS = Array.from({length: CONFIG.dewDrops.count}, (_, i) => ({
  petalIdx  : i % PETAL_COUNT_OUTER,
  tAlong    : 0.28 + (i * 0.053 % 0.58),     // 0.28–0.86, deterministic spread
  sideFrac  : ((i * 0.618033) % 1)*2 - 1,     // golden-ratio spread −1..1
  r         : CONFIG.dewDrops.minRadius + (i*0.37 % 1)*(CONFIG.dewDrops.maxRadius - CONFIG.dewDrops.minRadius),
  glintAngle: (i * 137.508) % 360 * Math.PI/180,
}));

function drawDewDrop(drop, fCX, fCY, baseAngle, tilt, length, width, openT) {
  // Mirror drawPetal's transform exactly:
  //   ctx.translate(fCX, fCY)  →  ctx.rotate(baseAngle + tilt)
  const L    = length * Math.min(openT*1.3, 1);
  const W2   = width  * Math.min(openT*1.2, 1);
  const curl = openT  * length * 0.12;
  const t    = drop.tAlong;

  // Sample the midrib quadratic at parameter t
  // Midrib: moveTo(0,0) quadraticCurveTo(curl*0.15, -L*0.48, curl*0.4, -L+curl)
  const mt = 1 - t;
  const mx = mt*mt*0 + 2*mt*t*(curl*0.15) + t*t*(curl*0.4);
  const my = mt*mt*0 + 2*mt*t*(-L*0.48)   + t*t*(-L+curl);

  // Half-width of petal at this t (narrows toward tip)
  const halfW = W2 * (0.48 - t*0.32);
  const dx = mx + drop.sideFrac * halfW * 0.75;
  const dy = my;

  const r = drop.r * SCALE;

  ctx.save();
  ctx.translate(fCX, fCY);
  ctx.rotate(baseAngle + tilt);
  ctx.translate(dx, dy);

  // Body — radial gradient: white core → blue-tinted rim
  const dg = radGrad(-r*0.30, -r*0.28, 0, r, [
    [0,   'rgba(255,255,255,0.94)'],
    [0.25,'rgba(240,250,255,0.78)'],
    [0.55,'rgba(200,232,255,0.42)'],
    [0.82,'rgba(165,210,248,0.14)'],
    [1,   'rgba(140,185,230,0.00)'],
  ]);
  ctx.fillStyle = dg;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, PI2); ctx.fill();

  // Refracted petal colour visible through drop (lens tint)
  ctx.fillStyle = 'rgba(215,70,105,0.11)';
  ctx.beginPath(); ctx.arc(0, r*0.20, r*0.72, 0, PI2); ctx.fill();

  // Primary specular glint
  const gx = -r*0.32*Math.cos(drop.glintAngle);
  const gy = -r*0.32*Math.sin(drop.glintAngle);
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  ctx.beginPath(); ctx.arc(gx, gy, r*0.19, 0, PI2); ctx.fill();

  // Tiny secondary glint
  ctx.fillStyle = 'rgba(255,255,255,0.52)';
  ctx.beginPath(); ctx.arc(gx*0.4+r*0.08, gy*0.4+r*0.06, r*0.08, 0, PI2); ctx.fill();

  // Contact shadow
  ctx.save();
  ctx.globalAlpha = 0.20;
  ctx.fillStyle = 'rgba(55,0,18,0.65)';
  ctx.filter = `blur(${r*0.65}px)`;
  ctx.beginPath(); ctx.ellipse(r*0.08, r*0.52, r*0.70, r*0.20, 0, 0, PI2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ══════════════════════════════════════════════════════
// PETAL DRAWING
// ══════════════════════════════════════════════════════
function drawPetal(i, total, cx, cy, baseAngle, length, width, openT, depth, hueShift) {
  if (openT <= 0.001) return;

  const angle   = baseAngle + (i/total)*PI2;
  const flutter = breezeVal * Math.sin(i*0.9 + T*1.2) * 2.5 * SCALE;
  const fCX     = cx + Math.cos(angle)*flutter;
  const fCY     = cy + Math.sin(angle)*flutter*0.4;

  const L    = length * Math.min(openT*1.3, 1);
  const W2   = width  * Math.min(openT*1.2, 1);
  const tilt = lerp(-0.32, 0.08, openT);
  const curl = openT * length * 0.12;
  const hs   = hueShift || 0;  // optional hue offset for secondary flower

  ctx.save();
  ctx.translate(fCX, fCY);
  ctx.rotate(angle + tilt);

  function petalPath() {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-W2*0.9, -L*0.15, -W2*0.65, -L*0.75,  curl*0.4, -L+curl);
    ctx.bezierCurveTo( W2*0.65,-L*0.75,  W2*0.9,  -L*0.15,  0, 0);
    ctx.closePath();
  }

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.13*depth*openT;
  ctx.fillStyle = '#1a0510';
  ctx.filter = `blur(${5*SCALE}px)`;
  ctx.translate(4*SCALE*depth, 5*SCALE*depth);
  petalPath(); ctx.fill();
  ctx.restore();

  // Main fill
  const c0 = hs ? shiftHue('#5e0d2e', hs) : '#5e0d2e';
  ctx.fillStyle = linGrad(0,0,0,-L,[
    [0,   c0],
    [0.15,'#8b1a42'],
    [0.38,'#b83060'],
    [0.62,'#d44e75'],
    [0.80,'#e8738f'],
    [0.92,'#f5a0b5'],
    [1,   '#ffd0db'],
  ]);
  petalPath(); ctx.fill();

  // SSS glow
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = linGrad(0,-L*0.55,0,-L,[
    [0,'rgba(255,140,110,0)'],[0.5,'rgba(255,120,100,0.07)'],[1,'rgba(255,210,170,0.28)'],
  ]);
  petalPath(); ctx.fill();
  ctx.fillStyle = linGrad(-W2*0.55,-L*0.35,W2*0.55,-L*0.35,[
    [0,'rgba(255,90,80,0.14)'],[0.45,'rgba(255,255,255,0)'],[0.55,'rgba(255,255,255,0)'],[1,'rgba(255,90,80,0.14)'],
  ]);
  petalPath(); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();

  // Veins
  ctx.save(); ctx.lineCap='round';
  ctx.strokeStyle='rgba(130,20,45,0.32)'; ctx.lineWidth=0.9*SCALE;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(curl*0.15,-L*0.48,curl*0.4,-L+curl); ctx.stroke();
  for (let v=0;v<5;v++) {
    const vt=(v+1)/6, vy=-L*vt*0.9, vxL=-W2*(0.5-vt*0.28), vxR=W2*(0.5-vt*0.28);
    ctx.strokeStyle=`rgba(120,18,42,${0.15-vt*0.06})`; ctx.lineWidth=(0.65-vt*0.15)*SCALE;
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.quadraticCurveTo(vxL*0.55,vy-L*0.038,vxL,vy-L*0.018); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.quadraticCurveTo(vxR*0.55,vy-L*0.038,vxR,vy-L*0.018); ctx.stroke();
  }
  ctx.restore();

  // Specular
  ctx.save(); ctx.globalCompositeOperation='screen';
  ctx.fillStyle=linGrad(-W2*0.28,-L*0.18,W2*0.05,-L*0.62,[
    [0,'rgba(255,240,200,0)'],[0.25,'rgba(255,240,200,0.14)'],[0.55,'rgba(255,255,255,0.20)'],[1,'rgba(255,255,255,0)'],
  ]);
  petalPath(); ctx.fill();
  ctx.globalCompositeOperation='source-over'; ctx.restore();

  ctx.restore();

  // Return the transform data so callers can place dew on this exact petal
  return { fCX, fCY, angle, tilt };
}

// Simple hue-rotation helper for colour variation
function shiftHue(hex, deg) {
  // Convert hex → HSL → shift → back to rgba string (fast approx)
  const r=parseInt(hex.slice(1,3),16)/255,
        g=parseInt(hex.slice(3,5),16)/255,
        b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0,s=0,l=(max+min)/2;
  if(d>0){
    s=d/(1-Math.abs(2*l-1));
    if(max===r) h=((g-b)/d+6)%6;
    else if(max===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h*=60;
  }
  h=(h+deg+360)%360;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r2,g2,b2;
  if(h<60){r2=c;g2=x;b2=0;}else if(h<120){r2=x;g2=c;b2=0;}
  else if(h<180){r2=0;g2=c;b2=x;}else if(h<240){r2=0;g2=x;b2=c;}
  else if(h<300){r2=x;g2=0;b2=c;}else{r2=c;g2=0;b2=x;}
  return `rgb(${Math.round((r2+m)*255)},${Math.round((g2+m)*255)},${Math.round((b2+m)*255)})`;
}

// ══════════════════════════════════════════════════════
// FLOWER (shared renderer for main and secondary)
// ══════════════════════════════════════════════════════
function drawFlowerAt(hx, hy, sc, bloomOffset, bv, hueShift, showDew) {
  // sc = scale factor, bloomOffset = extra time added to BLOOM_START,
  // bv = this flower's breeze value, hueShift = colour offset
  const bs = BLOOM_START + bloomOffset;  // effective bloom start

  function pot(i, total, lStart, gap, dur) {
    return clamp((T - (bs + lStart + i*gap)) / dur, 0, 1);
  }

  // Sepals
  const sepalT = clamp((T - bs)/0.8, 0, 1);
  if (sepalT > 0) {
    for (let s=0;s<5;s++) {
      const sa   = (s/5)*PI2 + bv*0.04;
      const sLen = 28*SCALE*sc*easeOut(sepalT,2);
      ctx.save(); ctx.translate(hx,hy); ctx.rotate(sa);
      ctx.fillStyle = linGrad(0,0,0,-sLen,[[0,'#2a5520'],[0.6,'#3d7a2e'],[1,'#4a9038']]);
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.bezierCurveTo(-6*SCALE*sc,-sLen*0.3,-5*SCALE*sc,-sLen*0.8,0,-sLen);
      ctx.bezierCurveTo( 5*SCALE*sc,-sLen*0.8, 6*SCALE*sc,-sLen*0.3,0,0);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
  }

  // Outer petals — store transforms for dew placement
  const cfg = CONFIG.petals;
  const outerLen = cfg.outer.length(SCALE*sc), outerW = cfg.outer.width(SCALE*sc);
  const outerTransforms = [];
  for (let i=0;i<PETAL_COUNT_OUTER;i++) {
    const ot = easeOut(pot(i,PETAL_COUNT_OUTER,cfg.outer.startTime,cfg.outer.layerGap,cfg.outer.duration),2);
    const ang = (i/PETAL_COUNT_OUTER)*PI2;
    const tr = drawPetal(i,PETAL_COUNT_OUTER,hx,hy,ang,outerLen,outerW,ot,cfg.outer.depth,hueShift);
    if (tr) outerTransforms.push({...tr, ot, i});
  }

  // Dew drops — only after BLOOM_DONE, on fully-open petals
  if (showDew && T >= BLOOM_DONE) {
    DEW_DROPS.forEach(d => {
      const tr = outerTransforms.find(t => t.i === d.petalIdx);
      if (!tr || tr.ot < 0.92) return;
      drawDewDrop(d, tr.fCX, tr.fCY, tr.angle, tr.tilt, outerLen, outerW, tr.ot);
    });
  }

  // Mid petals
  const midLen = cfg.mid.length(SCALE*sc), midW = cfg.mid.width(SCALE*sc);
  for (let i=0;i<PETAL_COUNT_MID;i++) {
    const ot = easeOut(pot(i,PETAL_COUNT_MID,cfg.mid.startTime,cfg.mid.layerGap,cfg.mid.duration),2);
    drawPetal(i,PETAL_COUNT_MID,hx,hy,(i/PETAL_COUNT_MID)*PI2+Math.PI/8,midLen,midW,ot,cfg.mid.depth,hueShift);
  }

  // Inner petals
  const innerLen = cfg.inner.length(SCALE*sc), innerW = cfg.inner.width(SCALE*sc);
  for (let i=0;i<PETAL_COUNT_INNER;i++) {
    const ot = easeOut(pot(i,PETAL_COUNT_INNER,cfg.inner.startTime,cfg.inner.layerGap,cfg.inner.duration),2);
    drawPetal(i,PETAL_COUNT_INNER,hx,hy,(i/PETAL_COUNT_INNER)*PI2+Math.PI/6,innerLen,innerW,ot,cfg.inner.depth,hueShift);
  }

  // Stamens
  const stamenT = clamp((T-(bs+2.8))/0.6, 0, 1);
  if (stamenT > 0) {
    for (let f=0;f<22;f++) {
      const fa   = (f/22)*PI2 + T*0.12;
      const fLen = (14+Math.sin(f*1.7)*4)*SCALE*sc * easeOutBack(Math.min(stamenT*1.3,1));
      const fW   = (3.5+Math.cos(f*2.1))*SCALE*sc;
      const fx   = hx + Math.cos(fa)*fW, fy = hy + Math.sin(fa)*fW;
      ctx.save();
      ctx.strokeStyle = linGrad(fx,fy,fx+Math.cos(fa)*fLen,fy+Math.sin(fa)*fLen,
        [[0,'rgba(220,160,40,0.6)'],[1,'rgba(255,210,80,0.9)']]);
      ctx.lineWidth=0.9*SCALE*sc; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx+Math.cos(fa)*fLen,fy+Math.sin(fa)*fLen); ctx.stroke();
      const ax=fx+Math.cos(fa)*fLen, ay=fy+Math.sin(fa)*fLen;
      ctx.fillStyle=radGrad(ax,ay,0,2.8*SCALE*sc,[[0,'#ffe880'],[0.5,'#d4a030'],[1,'rgba(160,80,0,0)']]);
      ctx.beginPath(); ctx.arc(ax,ay,2.5*SCALE*sc,0,PI2); ctx.fill();
      ctx.restore();
    }
  }

  // Center disk
  const centerT = clamp((T-(bs+2.2))/0.7, 0, 1);
  if (centerT > 0) {
    const cs = easeOutBack(Math.min(centerT,1));
    const cr = 18*SCALE*sc*cs;
    ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#000'; ctx.filter=`blur(${8*SCALE*sc}px)`;
    ctx.beginPath(); ctx.arc(hx+3*SCALE*sc,hy+3*SCALE*sc,cr,0,PI2); ctx.fill(); ctx.restore();
    ctx.fillStyle=radGrad(hx-4*SCALE*sc,hy-4*SCALE*sc,0,cr,
      [[0,'#ffe89a'],[0.3,'#f5c842'],[0.6,'#d4920a'],[0.85,'#a06500'],[1,'#7a4800']]);
    ctx.beginPath(); ctx.arc(hx,hy,cr,0,PI2); ctx.fill();
    for(let p=0;p<28;p++){
      const pa=(p/28)*PI2+T*0.08, pr=(4+(p%3)*3.5)*SCALE*sc*cs;
      ctx.fillStyle=`rgba(180,100,0,${0.28+Math.sin(p)*0.12})`;
      ctx.beginPath(); ctx.arc(hx+Math.cos(pa)*pr*0.88,hy+Math.sin(pa)*pr*0.88,0.9*SCALE*sc,0,PI2); ctx.fill();
    }
    ctx.fillStyle=radGrad(hx-5*SCALE*sc,hy-5*SCALE*sc,0,cr*0.6,
      [[0,'rgba(255,255,220,0.55)'],[1,'rgba(255,255,220,0)']]);
    ctx.beginPath(); ctx.arc(hx,hy,cr,0,PI2); ctx.fill();
    const pulseR=cr*(1.8+0.15*Math.sin(T*2.2));
    ctx.fillStyle=radGrad(hx,hy,cr*0.5,pulseR,
      [[0,`rgba(255,180,30,${0.12+0.06*Math.sin(T*2.2)})`],[1,'rgba(255,180,30,0)']]);
    ctx.beginPath(); ctx.arc(hx,hy,pulseR,0,PI2); ctx.fill();
  }
}

// ── Stem (main) ───────────────────────────────────────
function drawStem(progress, sp) {
  if (progress<=0) return;
  const tp = cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty, progress);
  const sw = CONFIG.stem.width(SCALE);
  ctx.save(); ctx.lineCap='round';
  ctx.save(); ctx.globalAlpha=0.18; ctx.strokeStyle='#000';
  ctx.lineWidth=sw*1.8; ctx.filter='blur(5px)';
  ctx.beginPath(); ctx.moveTo(sp.bx+8,sp.by);
  ctx.bezierCurveTo(sp.c1x+10,sp.c1y,sp.c2x+12,sp.c2y,tp.x+14,tp.y); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle=linGrad(sp.bx,sp.by,tp.x,tp.y,
    [[0,'#1a3d1a'],[0.3,'#2a5e28'],[0.65,'#3a7a34'],[0.85,'#4a9040'],[1,'#3d7d35']]);
  ctx.lineWidth=sw;
  ctx.beginPath(); ctx.moveTo(sp.bx,sp.by);
  ctx.bezierCurveTo(sp.c1x,sp.c1y,sp.c2x,sp.c2y,tp.x,tp.y); ctx.stroke();
  ctx.strokeStyle=linGrad(sp.bx,sp.by,tp.x,tp.y,
    [[0,'rgba(120,200,80,0)'],[0.5,'rgba(160,230,100,0.35)'],[1,'rgba(180,240,110,0.18)']]);
  ctx.lineWidth=sw*0.35;
  ctx.beginPath(); ctx.moveTo(sp.bx-sw*0.2,sp.by);
  ctx.bezierCurveTo(sp.c1x-sw*0.2,sp.c1y,sp.c2x-sw*0.2,sp.c2y,tp.x-sw*0.2,tp.y); ctx.stroke();
  if (progress>0.5) {
    ctx.strokeStyle='rgba(90,160,60,0.28)'; ctx.lineWidth=0.6*SCALE;
    for(let h=0;h<22;h++){
      const ht=h/22*progress;
      const pt=cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty,ht);
      const side=h%2?1:-1, len=(3+Math.sin(h*1.7)*2+2)*SCALE;
      ctx.beginPath(); ctx.moveTo(pt.x,pt.y);
      ctx.lineTo(pt.x+side*len-breezeVal*2,pt.y-len*0.5); ctx.stroke();
    }
  }
  ctx.restore();
}

// Slimmer secondary stem
function drawStemSecondary(progress, sp, sc) {
  if (progress<=0) return;
  const tp = cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty,progress);
  const sw = CONFIG.stem.width(SCALE)*sc;
  ctx.save(); ctx.lineCap='round';
  ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle='#000';
  ctx.lineWidth=sw*1.6; ctx.filter='blur(4px)';
  ctx.beginPath(); ctx.moveTo(sp.bx+5,sp.by);
  ctx.bezierCurveTo(sp.c1x+6,sp.c1y,sp.c2x+7,sp.c2y,tp.x+8,tp.y); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle=linGrad(sp.bx,sp.by,tp.x,tp.y,
    [[0,'#162f16'],[0.4,'#245222'],[0.75,'#326830'],[1,'#3a7530']]);
  ctx.lineWidth=sw;
  ctx.beginPath(); ctx.moveTo(sp.bx,sp.by);
  ctx.bezierCurveTo(sp.c1x,sp.c1y,sp.c2x,sp.c2y,tp.x,tp.y); ctx.stroke();
  ctx.restore();
}

// ── Leaves ────────────────────────────────────────────
function drawLeaf(cx,cy,angle,length,width,flip,progress) {
  if(progress<=0)return;
  const s=easeOutBack(Math.min(progress,1));
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle); ctx.scale(s*(flip?-1:1),s);
  ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#000'; ctx.filter='blur(4px)';
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(width*0.6,-length*0.15,width*0.8,-length*0.6,0,-length);
  ctx.bezierCurveTo(-width*0.15,-length*0.55,-width*0.05,-length*0.2,0,0);
  ctx.fill(); ctx.restore();
  ctx.fillStyle=linGrad(0,0,0,-length,
    [[0,'#1a3a16'],[0.35,'#2d6225'],[0.65,'#3a7a2e'],[0.85,'#4a9038'],[1,'#5aaa44']]);
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(width*0.7,-length*0.12,width*0.9,-length*0.55,0,-length);
  ctx.bezierCurveTo(-width*0.12,-length*0.55,-width*0.05,-length*0.18,0,0);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(20,60,15,0.55)'; ctx.lineWidth=1.2*SCALE; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-length); ctx.stroke();
  ctx.strokeStyle='rgba(20,60,15,0.20)'; ctx.lineWidth=0.5*SCALE;
  for(let v=1;v<=5;v++){
    const vt=v/6,vy=-length*vt,vx=width*(1-vt)*0.55;
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.quadraticCurveTo(vx*0.6,vy-length*0.06,vx,vy-length*0.04); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.quadraticCurveTo(-vx*0.5,vy-length*0.05,-vx*0.8,vy-length*0.03); ctx.stroke();
  }
  ctx.restore();
}

function drawLeaves(progress, sp) {
  const p1=cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty,0.38);
  const p2=cubicBez(sp.bx,sp.by,sp.c1x,sp.c1y,sp.c2x,sp.c2y,sp.tx,sp.ty,0.58);
  const lLen=62*SCALE, lW=28*SCALE;
  drawLeaf(p1.x,p1.y,-0.55+breezeVal*0.04,lLen*1.1,lW,true,progress);
  drawLeaf(p2.x,p2.y, 0.62+breezeVal*0.03,lLen,     lW,false,progress);
}

// ── Soil ──────────────────────────────────────────────
function drawSoil(groundY) {
  const soilH=H-groundY;
  ctx.fillStyle=linGrad(0,groundY,0,H,
    [[0,'rgba(18,9,4,0)'],[0.05,'#120804'],[0.3,'#1a0e08'],[0.6,'#140b06'],[1,'#0d0704']]);
  ctx.fillRect(0,groundY,W,soilH);
  const sp=getStemPoints(breezeVal, groundY);
  ctx.fillStyle=radGrad(sp.bx,groundY,0,70*SCALE,[[0,'rgba(0,0,0,0.55)'],[1,'rgba(0,0,0,0)']]);
  ctx.beginPath(); ctx.ellipse(sp.bx,groundY,126*SCALE,31*SCALE,0,0,PI2); ctx.fill();
  SOIL.forEach(p=>{
    ctx.globalAlpha=0.18+p.depth*0.28;
    ctx.fillStyle=`hsl(${p.hue},${p.sat}%,${p.li}%)`;
    ctx.beginPath(); ctx.arc(p.x*W,groundY+4+p.depth*soilH*0.6,p.r*SCALE,0,PI2); ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.strokeStyle=linGrad(0,groundY,W,groundY,
    [[0,'rgba(80,40,10,0)'],[0.3,'rgba(90,50,15,0.35)'],[0.7,'rgba(90,50,15,0.35)'],[1,'rgba(80,40,10,0)']]);
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();
}

// ── Regular short grass ───────────────────────────────
function drawShortGrass(layer, groundY) {
  // layer 0 = back (even indices), 1 = front (odd)
  ctx.lineCap='round';
  GRASS.filter((_,i)=>i%2===layer).forEach(g=>{
    const gx=g.xf*W;
    const sway=Math.sin(T*g.freq+g.phase)*g.amp*SCALE*(layer===0?0.5:0.7+breezeVal*0.5);
    const sx=sway*(1+breezeVal*0.25);
    const tipX=gx+sx, tipY=groundY-g.h*(layer===0?0.65:1)*SCALE;
    ctx.globalAlpha=layer===0?0.45:0.82;
    ctx.strokeStyle=linGrad(gx,groundY,tipX,tipY,[
      [0,`hsl(${g.hue},${g.sat-10}%,${g.li-6}%)`],
      [0.5,`hsl(${g.hue},${g.sat}%,${g.li}%)`],
      [1,`hsl(${g.hue+(layer?5:0)},${g.sat+8}%,${g.li+10}%)`],
    ]);
    ctx.lineWidth=g.w*(layer===0?0.7:1)*SCALE;
    ctx.beginPath(); ctx.moveTo(gx,groundY);
    ctx.quadraticCurveTo(gx+sx*0.42+g.curve*g.h*0.28*SCALE,groundY-g.h*0.38*SCALE,tipX,tipY);
    ctx.stroke();
  });
  ctx.globalAlpha=1;
}

// ── Tall sharp grass ──────────────────────────────────
function drawSharpGrass(layer, groundY) {
  ctx.lineCap='round';
  SHARP_GRASS.filter((_,i)=>i%2===layer).forEach(g=>{
    const gx=g.xf*W;
    const sway=Math.sin(T*g.freq+g.phase)*g.amp*SCALE*(0.65+breezeVal*0.45)+g.lean*SCALE*8;
    const tipX=gx+sway, tipY=groundY-g.h*SCALE;
    const alpha=(layer===0?0.52:0.80);
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=linGrad(gx,groundY,tipX,tipY,[
      [0,  `hsl(${g.hue},${g.sat-14}%,${g.li-8}%)`],
      [0.45,`hsl(${g.hue},${g.sat}%,${g.li}%)`],
      [1,  `hsl(${g.hue+6},${g.sat+12}%,${g.li+18}%)`],
    ]);
    ctx.lineWidth=g.w*SCALE;
    ctx.beginPath(); ctx.moveTo(gx,groundY);
    // Two-point quadratic: lean + sway creates natural arc
    ctx.quadraticCurveTo(gx+sway*0.38,groundY-g.h*0.48*SCALE,tipX,tipY);
    ctx.stroke();

    // Fine seed-tip on taller blades
    if (g.h > 130 && T > BLOOM_DONE - 1) {
      const tipAlpha=smoothstep(BLOOM_DONE-1,BLOOM_DONE+1,T)*alpha;
      ctx.globalAlpha=tipAlpha;
      ctx.fillStyle=`hsl(${g.hue+10},${g.sat-5}%,${g.li+22}%)`;
      ctx.beginPath(); ctx.arc(tipX,tipY,1.1*SCALE,0,PI2); ctx.fill();
      // wispy awn
      ctx.strokeStyle=`hsl(${g.hue+15},${g.sat}%,${g.li+28}%)`;
      ctx.lineWidth=0.5*SCALE;
      ctx.beginPath();
      ctx.moveTo(tipX,tipY);
      ctx.lineTo(tipX+sway*0.15,tipY-5*SCALE);
      ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
}

// ── Small wildflowers ─────────────────────────────────
function drawGrassFlower(gf, groundY) {
  const openT=clamp((T-gf.bloomDelay)/1.1,0,1);
  if(openT<=0)return;
  const gx=gf.xf*W;
  const sway=Math.sin(T*gf.freq+gf.phase)*gf.amp*SCALE*(0.7+breezeVal*0.5);
  const stemH=gf.stemH*SCALE*easeOut(openT,2);
  const tipX=gx+sway, tipY=groundY-stemH;
  const s=easeOutBack(Math.min(openT,1));
  const alpha=Math.min(openT*2,1)*0.88;

  ctx.save();
  ctx.globalAlpha=alpha*0.78;
  ctx.strokeStyle=linGrad(gx,groundY,tipX,tipY,[[0,'hsl(115,40%,13%)'],[1,'hsl(120,46%,26%)']]);
  ctx.lineWidth=1.0*SCALE; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(gx,groundY);
  ctx.quadraticCurveTo(gx+sway*0.38,groundY-stemH*0.5,tipX,tipY); ctx.stroke();
  ctx.restore();

  const tc=gf.tc;
  const pLen=gf.petalLen*SCALE*s, pW=gf.petalW*SCALE*s;

  ctx.save(); ctx.translate(tipX,tipY); ctx.globalAlpha=alpha;

  if (gf.type==='bellflower') {
    const bW=pW*2.0*s, bH=pLen*1.5*s;
    ctx.fillStyle=linGrad(0,0,0,bH,[[0,tc.p2],[0.5,tc.p1],[1,'rgba(180,160,255,0.12)']]);
    ctx.beginPath(); ctx.moveTo(-bW*0.5,0);
    ctx.bezierCurveTo(-bW*0.82,bH*0.38,-bW*0.6,bH*0.78,0,bH);
    ctx.bezierCurveTo(bW*0.6,bH*0.78,bW*0.82,bH*0.38,bW*0.5,0);
    ctx.quadraticCurveTo(0,-bH*0.08,-bW*0.5,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(30,10,80,0.32)'; ctx.beginPath();
    ctx.ellipse(0,bH*0.18,bW*0.28,bH*0.10,0,0,PI2); ctx.fill();
    ctx.strokeStyle='rgba(180,155,255,0.48)'; ctx.lineWidth=0.7*SCALE;
    ctx.beginPath(); ctx.ellipse(0,0,bW*0.47,bH*0.06,0,Math.PI,PI2); ctx.stroke();
  } else if (gf.type==='poppy') {
    for(let p=0;p<tc.count;p++){
      const pa=(p/tc.count)*PI2+T*0.012;
      ctx.save(); ctx.rotate(pa);
      ctx.fillStyle=linGrad(0,0,0,-pLen*1.35,[[0,'#8b0c0c'],[0.3,tc.p2],[0.7,tc.p1],[1,'#ff9090']]);
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.bezierCurveTo(-pW*1.05,-pLen*0.22,-pW*0.88,-pLen*0.98,0,-pLen*1.35);
      ctx.bezierCurveTo( pW*0.88,-pLen*0.98, pW*1.05,-pLen*0.22,0,0);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(8,0,0,0.52)';
      ctx.beginPath(); ctx.ellipse(0,-pLen*0.20,pW*0.50,pLen*0.18,0,0,PI2); ctx.fill();
      ctx.restore();
    }
    const crP=pW*0.82*s;
    ctx.fillStyle=radGrad(0,0,0,Math.max(crP,0.5),[[0,'#1a0a0a'],[0.7,'#111'],[1,'rgba(0,0,0,0)']]);
    ctx.beginPath(); ctx.arc(0,0,Math.max(crP,0.5),0,PI2); ctx.fill();
    for(let r=0;r<8;r++){
      const ra=(r/8)*PI2; ctx.strokeStyle=`hsl(${32+r*4},50%,52%)`;
      ctx.lineWidth=0.65*SCALE; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ra)*crP*0.82,Math.sin(ra)*crP*0.82); ctx.stroke();
    }
  } else {
    for(let p=0;p<tc.count;p++){
      const pa=(p/tc.count)*PI2+T*0.016;
      ctx.save(); ctx.rotate(pa);
      ctx.fillStyle=linGrad(0,0,0,-pLen,[[0,tc.p2],[0.4,tc.p1],[1,'#ffffff']]);
      ctx.beginPath(); ctx.ellipse(0,-pLen*0.5,pW*0.46,pLen*0.5,0,0,PI2); ctx.fill();
      ctx.strokeStyle=tc.veinColor; ctx.lineWidth=0.32*SCALE;
      ctx.beginPath(); ctx.moveTo(0,-pLen*0.05); ctx.lineTo(0,-pLen*0.90); ctx.stroke();
      ctx.restore();
    }
    const crG=Math.max(pW*0.70*s,0.5);
    ctx.fillStyle=radGrad(0,0,0,crG,[[0,tc.core],[0.55,gf.type==='violet'?'#7a20b0':gf.type==='yellow'?'#e0900a':'#d4a020'],[1,'rgba(0,0,0,0.3)']]);
    ctx.beginPath(); ctx.arc(0,0,crG,0,PI2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.50)';
    ctx.beginPath(); ctx.arc(-crG*0.26,-crG*0.26,crG*0.30,0,PI2); ctx.fill();
  }
  ctx.restore();
}

// ── Pollen ────────────────────────────────────────────
const POLLEN=Array.from({length:CONFIG.particles.pollen},()=>({
  x:0.5+(Math.random()-0.5)*0.15, y:0.44+Math.random()*0.08,
  vx:(Math.random()-0.5)*0.14, vy:-0.05-Math.random()*0.14,
  r:CONFIG.pollen.minSize+Math.random()*(CONFIG.pollen.maxSize-CONFIG.pollen.minSize),
  life:0, maxLife:CONFIG.pollen.minLife+Math.random()*(CONFIG.pollen.maxLife-CONFIG.pollen.minLife),
  hue:CONFIG.pollen.hue[0]+Math.random()*(CONFIG.pollen.hue[1]-CONFIG.pollen.hue[0]),
  born:BLOOM_DONE+Math.random()*4,
}));

function drawPollen() {
  POLLEN.forEach(p=>{
    if(T<p.born)return;
    if(p.life>=p.maxLife){
      p.x=0.5+(Math.random()-0.5)*0.12; p.y=0.44+Math.random()*0.08;
      p.vx=(Math.random()-0.5)*0.12; p.vy=-0.06-Math.random()*0.12;
      p.life=0; p.born=T+Math.random()*3; return;
    }
    p.life+=0.016;
    p.x+=(p.vx+breezeVal*0.012)*0.016; p.y+=p.vy*0.016;
    p.vy+=0.008*0.016; p.vx+=(Math.random()-0.5)*0.01;
    const lt=p.life/p.maxLife;
    const a=lt<0.1?lt*10:lt>0.8?(1-lt)*5:1;
    ctx.globalAlpha=a*0.55;
    ctx.fillStyle=`hsl(${p.hue},90%,65%)`;
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r*SCALE,0,PI2); ctx.fill();
    ctx.globalAlpha=1;
  });
}

// ── Bokeh background ──────────────────────────────────
const BOKEH=Array.from({length:CONFIG.particles.bokeh},()=>{
  const w=Math.random()<CONFIG.bokeh.warmRatio;
  return{
    x:Math.random()*W, y:Math.random()*H*0.9,
    r:(CONFIG.bokeh.minR+Math.random()*CONFIG.bokeh.maxR)*SCALE,
    op:CONFIG.bokeh.minOp+Math.random()*(CONFIG.bokeh.maxOp-CONFIG.bokeh.minOp),
    freq:CONFIG.bokeh.minFreq+Math.random()*(CONFIG.bokeh.maxFreq-CONFIG.bokeh.minFreq),
    phase:Math.random()*PI2,
    color:w?`rgba(255,${140+Math.random()*60|0},${30+Math.random()*40|0},1)`
            :`rgba(${60+Math.random()*40|0},${80+Math.random()*60|0},${200+Math.random()*55|0},1)`,
  };
});

function drawBackground(groundY) {
  ctx.fillStyle='#06030a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=radGrad(W*0.72,H*0.08,0,H*0.7,
    [[0,'rgba(255,160,50,0.14)'],[0.3,'rgba(255,120,40,0.07)'],[0.7,'rgba(200,80,30,0.03)'],[1,'rgba(0,0,0,0)']]);
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle=radGrad(W*0.12,H*0.05,0,H*0.55,
    [[0,'rgba(80,120,200,0.09)'],[0.5,'rgba(60,90,160,0.04)'],[1,'rgba(0,0,0,0)']]);
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle=linGrad(0,groundY-80,0,groundY+40,
    [[0,'rgba(0,0,0,0)'],[0.6,'rgba(20,10,5,0.3)'],[1,'rgba(20,10,5,0.55)']]);
  ctx.fillRect(0,groundY-80,W,120);
  BOKEH.forEach(b=>{
    const pulse=0.6+0.4*Math.sin(T*b.freq+b.phase);
    ctx.globalAlpha=b.op*pulse;
    ctx.fillStyle=radGrad(b.x,b.y,0,b.r,
      [[0,b.color],[0.5,b.color.replace('1)','0.3)')],[1,'rgba(0,0,0,0)']]);
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,PI2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── Pills ─────────────────────────────────────────────
const MESSAGES=CONFIG.messages;
let msgIdx=0;
function spawnPill(){
  const pill=document.createElement('div');
  pill.className='pill';
  const dur=7+Math.random()*4;
  pill.style.cssText=`left:${5+Math.random()*68}vw;top:${52+Math.random()*20}vh;animation-duration:${dur}s`;
  pill.textContent=MESSAGES[msgIdx++%MESSAGES.length];
  document.body.appendChild(pill);
  setTimeout(()=>pill.remove(),(dur+1)*1000);
}
setTimeout(()=>{ spawnPill(); setInterval(spawnPill, CONFIG.messagePillInterval); },
  BLOOM_DONE*1000+CONFIG.messagePillDelay);

// ── Music ─────────────────────────────────────────────
const musicBtn = document.getElementById('musicBtn');
const iconNote = document.getElementById('iconNote');
const iconPause= document.getElementById('iconPause');
let audio=null, musicPlaying=false;

if (CONFIG.musicUrl && CONFIG.musicUrl.trim()!=='') {
  musicBtn.classList.remove('hidden');
  audio = new Audio(CONFIG.musicUrl);
  audio.loop   = CONFIG.musicLoop;
  audio.volume = CONFIG.musicVolume;
  audio.preload = 'none';

  musicBtn.addEventListener('click', () => {
    if (musicPlaying) {
      audio.pause();
      musicPlaying=false;
      musicBtn.classList.remove('playing');
      iconNote.style.display='block'; iconPause.style.display='none';
    } else {
      audio.play().then(()=>{
        musicPlaying=true;
        musicBtn.classList.add('playing');
        iconNote.style.display='none'; iconPause.style.display='block';
      }).catch(err=>console.warn('Audio play failed:',err));
    }
  });
}

// ── Cursor & sparks ───────────────────────────────────
const cur=document.getElementById('cursor'), curT=document.getElementById('cursor-trail');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
  curT.style.left=e.clientX+'px'; curT.style.top=e.clientY+'px';
});
document.addEventListener('click',e=>{
  if(e.target===musicBtn||musicBtn.contains(e.target))return;
  for(let i=0;i<14;i++){
    const sp=document.createElement('div'); sp.className='spark';
    const a=(i/14)*PI2+Math.random()*0.5, d=30+Math.random()*60;
    const col=Math.random()<0.5?'#d4a853':'#f08090';
    sp.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--tx:translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px);background:${col};box-shadow:0 0 4px ${col};animation-duration:${0.5+Math.random()*0.4}s;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;`;
    document.body.appendChild(sp); setTimeout(()=>sp.remove(),1000);
  }
});

// ════════════════════════════════════════════════════════
// MAIN RENDER LOOP
// ════════════════════════════════════════════════════════
function frame(now) {
  if (!startTime) startTime=now;
  if (!lastTime)  lastTime=now;
  const dt=Math.min((now-lastTime)/1000, 0.05);
  lastTime=now; T=(now-startTime)/1000;

  updateBreeze(dt);

  // ── Derived positions ──────────────────────────────
  const groundY = CY + H*STEM_BOT;

  // Main flower stem & head
  const mainSP = getStemPoints(breezeVal, groundY);

  // Secondary flower — left-ish, perspective-lower, independent stem
  const sfCfg  = CONFIG.secondaryFlower;
  const sfX    = W * sfCfg.xFrac;
  const sfY    = H * sfCfg.yFrac;
  const sfBv   = breezeVal * sfCfg.breezeScale;
  const sfBaseY= groundY + H * sfCfg.stemOffsetY;  // stem base a bit lower
  const sfSP   = getStemPointsSF(sfBv, sfBaseY, sfY, sfX);
  const sfSc   = sfCfg.scale;

  // Timing
  const stemProgress  = clamp((T-0.8)/1.2, 0, 1);
  const stemProgressSF= clamp((T-(0.8+sfCfg.bloomDelay*0.35))/1.4, 0, 1);
  const leafProgress  = clamp((T-2.0)/0.9, 0, 1);
  const flowerT       = clamp((T-BLOOM_START)/0.5, 0, 1);
  const sfFlowerT     = clamp((T-(BLOOM_START+sfCfg.bloomDelay))/0.5, 0, 1);

  // ── Draw ──────────────────────────────────────────
  drawBackground(groundY);
  drawSoil(groundY);

  // Secondary stem (behind main)
  if (stemProgressSF > 0) drawStemSecondary(easeInOut(stemProgressSF), sfSP, sfSc);

  // Main stem
  if (stemProgress > 0) drawStem(easeInOut(stemProgress), mainSP);

  // Leaves on main stem only
  if (leafProgress > 0) drawLeaves(easeOut(leafProgress,2), mainSP);

  // Secondary flower (behind main since it's to the left and smaller)
  if (sfFlowerT > 0) {
    drawFlowerAt(sfX + sfBv*14, sfY, sfSc, sfCfg.bloomDelay, sfBv, sfCfg.petalHueShift, true);
  }

  // Main flower (on top)
  if (flowerT > 0) {
    drawFlowerAt(CX + breezeVal*28, CY, 1.0, 0, breezeVal, 0, true);
  }

  // ── Grass layers (render last for foreground overlap) ──
  drawShortGrass(0, groundY);              // back short grass
  GRASS_FLOWERS.filter((_,i)=>i%2===0).forEach(gf=>drawGrassFlower(gf, groundY));
  drawSharpGrass(0, groundY);              // back tall grass
  drawShortGrass(1, groundY);              // front short grass
  GRASS_FLOWERS.filter((_,i)=>i%2!==0).forEach(gf=>drawGrassFlower(gf, groundY));
  drawSharpGrass(1, groundY);              // front tall grass

  drawPollen();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
